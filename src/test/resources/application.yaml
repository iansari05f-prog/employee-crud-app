spring:
  datasource:
    url: jdbc:h2:mem:ems_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long
    expiration-ms: 3600000
  upload:
    directory: target/test-uploads
