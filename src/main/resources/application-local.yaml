# Offline / no-Neon development: mvn spring-boot:run -Dspring-boot.run.profiles=local
spring:
  datasource:
    url: jdbc:h2:mem:ems;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false

app:
  password-reset:
    expose-token-in-response: true
